<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Channel Auto</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="header">
    <h1>YT Channel Auto</h1>
    <span id="active-count" style="color: var(--text2); font-size: 13px;"></span>
  </div>

  <div class="nav">
    <button class="active" data-tab="status">Status Board</button>
    <button data-tab="channels">Channels</button>
    <button data-tab="pipeline">Pipeline Monitor</button>
    <button data-tab="new-channel">New Channel</button>
  </div>

  <div class="main">
    <!-- Status Board -->
    <div class="tab active" id="tab-status">
      <table>
        <thead>
          <tr>
            <th>Channel</th>
            <th>Format</th>
            <th>Niche</th>
            <th>Status</th>
            <th>Current Topic</th>
          </tr>
        </thead>
        <tbody id="status-table"></tbody>
      </table>
      <div id="status-empty" class="empty" style="display:none;">No channels configured yet</div>
    </div>

    <!-- Channels -->
    <div class="tab" id="tab-channels">
      <div id="channel-list" class="channel-grid"></div>
      <div id="channel-detail" style="display:none;">
        <div class="detail-header">
          <div>
            <button class="back-btn" onclick="showChannelList()">&larr; Back to channels</button>
            <h2 id="detail-name"></h2>
          </div>
          <span id="detail-status"></span>
        </div>
        <div class="detail-sections">
          <div>
            <!-- Produce -->
            <div class="card">
              <h3>Start Production</h3>
              <!-- Narrated channel fields -->
              <div id="narrated-produce">
                <div class="form-group">
                  <label>Topic</label>
                  <input type="text" id="produce-topic" placeholder="e.g. The Phoenix Lights Incident">
                </div>
              </div>
              <!-- Music-only channel fields -->
              <div id="music-only-produce" style="display:none;">
                <div class="form-group">
                  <label>Category + Modifier</label>
                  <div id="picker-selection" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                    <span id="picker-selected-text" style="color:var(--text2);font-size:13px;">None selected</span>
                  </div>
                  <button type="button" class="btn btn-secondary" onclick="openCategoryPicker()" style="margin-top:8px;">Browse Categories</button>
                  <input type="hidden" id="produce-music-category" value="">
                  <input type="hidden" id="produce-modifier" value="">
                </div>
                <div class="form-group">
                  <label>Image Concept <span style="color:var(--text2);font-size:12px">(additional direction)</span></label>
                  <input type="text" id="produce-image-concept" placeholder="e.g. Neon Tokyo rain-soaked streets" oninput="updatePromptPreview()">
                </div>
                <div class="form-group">
                  <label>Music Concept <span style="color:var(--text2);font-size:12px">(additional direction)</span></label>
                  <input type="text" id="produce-music-concept" placeholder="e.g. Extra reverb, deeper bass, slower tempo" oninput="updatePromptPreview()">
                </div>
                <div style="display:flex;gap:12px;">
                  <div class="form-group" style="flex:1;">
                    <label>Duration (hours)</label>
                    <input type="number" id="produce-duration" placeholder="e.g. 1, 4, 8" step="0.5" min="0.5">
                  </div>
                  <div class="form-group" style="flex:1;">
                    <label>Segment Count</label>
                    <input type="number" id="produce-segments" placeholder="0 = seamless" min="0">
                  </div>
                </div>
                <!-- Prompt Preview -->
                <div id="prompt-preview" style="display:none;">
                  <div class="form-group">
                    <label>Image Prompt <button type="button" class="btn-inline" onclick="togglePromptEdit('image')">edit</button></label>
                    <div id="prompt-image-preview" class="prompt-preview-text"></div>
                    <textarea id="prompt-image-override" class="prompt-override" style="display:none;" oninput="markOverride('image')"></textarea>
                  </div>
                  <div class="form-group">
                    <label>Music Prompt <button type="button" class="btn-inline" onclick="togglePromptEdit('music')">edit</button></label>
                    <div id="prompt-music-preview" class="prompt-preview-text"></div>
                    <textarea id="prompt-music-override" class="prompt-override" style="display:none;" oninput="markOverride('music')"></textarea>
                  </div>
                  <div class="form-group">
                    <label>Animation Prompt <button type="button" class="btn-inline" onclick="togglePromptEdit('animation')">edit</button></label>
                    <div id="prompt-animation-preview" class="prompt-preview-text"></div>
                    <textarea id="prompt-animation-override" class="prompt-override" style="display:none;" oninput="markOverride('animation')"></textarea>
                  </div>
                </div>
              </div>
              <div class="btn-group">
                <button class="btn btn-primary" onclick="startProduction()">Produce Now</button>
                <button class="btn btn-secondary" onclick="addToQueue()">Add to Queue</button>
              </div>
            </div>
            <!-- Queue -->
            <div class="card">
              <h3>Video Queue</h3>
              <div id="queue-list"></div>
              <div id="queue-empty" class="empty" style="display:none;">Queue is empty</div>
            </div>
          </div>
          <div>
            <!-- Channel Info -->
            <div class="card">
              <h3>Channel Info</h3>
              <div id="detail-stats"></div>
              <div id="oauth-section" style="margin-top: 16px;"></div>
            </div>
            <!-- History -->
            <div class="card">
              <h3>Run History</h3>
              <div id="history-list"></div>
              <div id="history-empty" class="empty" style="display:none;">No production runs yet</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Pipeline Monitor -->
    <div class="tab" id="tab-pipeline">
      <div id="pipeline-list"></div>
      <div id="pipeline-empty" class="empty">No active pipelines</div>
    </div>

    <!-- New Channel -->
    <div class="tab" id="tab-new-channel">
      <div class="card" style="max-width: 500px;">
        <h3>Initialize New Channel</h3>
        <form id="new-channel-form">
          <div class="form-group">
            <label>Channel Name</label>
            <input type="text" id="nc-name" required placeholder="e.g. Strange Universe">
          </div>
          <div class="form-group">
            <label>Niche / Topic</label>
            <input type="text" id="nc-niche" required placeholder="e.g. UFOs">
          </div>
          <div class="form-group">
            <label>Format</label>
            <select id="nc-format">
              <option value="long">Long</option>
              <option value="short">Short</option>
              <option value="long+short">Long + Short</option>
              <option value="music-only">Music Only</option>
            </select>
          </div>
          <div class="form-group">
            <label>ElevenLabs Voice ID (optional)</label>
            <input type="text" id="nc-voice" placeholder="Leave blank to set later">
          </div>
          <button type="submit" class="btn btn-primary">Create Channel</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Category Picker Modal -->
  <div id="category-picker-overlay" class="picker-overlay" style="display:none;" onclick="closeCategoryPicker(event)">
    <div class="picker-modal" onclick="event.stopPropagation()">
      <div class="picker-header">
        <h2>Category &amp; Modifier Browser</h2>
        <button class="picker-close" onclick="closeCategoryPicker()">&times;</button>
      </div>
      <div class="picker-body" id="picker-body"></div>
      <div class="picker-footer">
        <button class="btn btn-primary" onclick="confirmCategoryPicker()">Apply Selection</button>
        <button class="btn btn-secondary" onclick="clearCategoryPicker()">Clear</button>
      </div>
    </div>
  </div>

  <script src="/js/category-data.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
